name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same branch
# when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        env:
          # Build needs *some* values for env vars referenced at module
          # init time. Real secrets stay in Vercel — these are stubs.
          NEXTAUTH_SECRET: ci-stub-secret
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: ci-stub-key
          RESEND_API_KEY: ci-stub-resend
          EMAIL_FROM: noreply@xpert-ci.local
        run: npm run build
